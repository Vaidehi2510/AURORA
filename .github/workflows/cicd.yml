name: CI

# Lightsail CD (VM instance): ensures instance "Nat-Sec-Hackathon-Cyber-Dashboard" exists in us-east-1,
# rsyncs the repo, writes .env, runs docker compose. Not Lightsail Container Service.
#
# Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, LIGHTSAIL_SSH_PRIVATE_KEY (PEM for the instance key),
#   LIGHTSAIL_KEY_PAIR_NAME (Lightsail key pair name — required when the workflow creates a new instance),
#   OPENROUTER_API_KEY (optional but recommended for the API on the server).

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build SQLite database for tests
        run: python scripts/build_aurora_db.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image (Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: aurora:ci

      - name: Build web image (frontend/Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: aurora-web:ci

  deploy-lightsail:
    needs: [python, frontend, docker]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: us-east-1
      LIGHTSAIL_INSTANCE_NAME: Nat-Sec-Hackathon-Cyber-Dashboard
      LIGHTSAIL_BUNDLE_ID: nano_2_0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build app database for deploy bundle
        run: |
          pip install -r requirements.txt
          mkdir -p db artifacts/embeddings
          python scripts/build_aurora_db.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ensure_instance
        name: Ensure Lightsail instance (VM) exists
        run: |
          chmod +x .github/scripts/lightsail-ensure-instance.sh .github/scripts/lightsail-wait-operation.sh
          BOOT="${GITHUB_WORKSPACE}/.github/scripts/lightsail-instance-bootstrap.sh"
          IP=$(.github/scripts/lightsail-ensure-instance.sh \
            "$AWS_REGION" \
            "$LIGHTSAIL_INSTANCE_NAME" \
            "${{ secrets.LIGHTSAIL_KEY_PAIR_NAME }}" \
            "$LIGHTSAIL_BUNDLE_ID" \
            "ubuntu_22_04" \
            "us-east-1a" \
            "$BOOT")
          echo "instance_ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem

      - name: Wait for SSH and Docker
        env:
          INSTANCE_IP: ${{ steps.ensure_instance.outputs.instance_ip }}
        run: |
          for i in $(seq 1 90); do
            if ssh -i ~/.ssh/lightsail.pem -o ConnectTimeout=10 -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
              "ubuntu@${INSTANCE_IP}" 'sudo docker info' >/dev/null 2>&1; then
              echo "SSH and Docker are ready."
              exit 0
            fi
            echo "Waiting for SSH/Docker... ($i)"
            sleep 10
          done
          echo "Timeout waiting for Docker on the instance." >&2
          exit 1

      - name: Rsync application to instance
        env:
          INSTANCE_IP: ${{ steps.ensure_instance.outputs.instance_ip }}
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.vite' \
            --exclude '__pycache__' \
            --exclude '.venv' \
            -e "ssh -i $HOME/.ssh/lightsail.pem -o StrictHostKeyChecking=accept-new" \
            ./ "ubuntu@${INSTANCE_IP}:~/aurora/"

      - name: Install remote .env (OpenRouter)
        env:
          INSTANCE_IP: ${{ steps.ensure_instance.outputs.instance_ip }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -n "$OPENROUTER_API_KEY" ]; then
            printf 'OPENROUTER_API_KEY=%s\n' "$OPENROUTER_API_KEY" > .env.remote
            scp -i ~/.ssh/lightsail.pem -o StrictHostKeyChecking=accept-new \
              .env.remote "ubuntu@${INSTANCE_IP}:~/aurora/.env"
            rm -f .env.remote
          else
            echo "OPENROUTER_API_KEY not set; skipping remote .env (set secret for production API)." >&2
          fi

      - name: Docker Compose up
        env:
          INSTANCE_IP: ${{ steps.ensure_instance.outputs.instance_ip }}
        run: |
          ssh -i ~/.ssh/lightsail.pem -o StrictHostKeyChecking=accept-new "ubuntu@${INSTANCE_IP}" \
            'cd ~/aurora && sudo docker compose up -d --build'

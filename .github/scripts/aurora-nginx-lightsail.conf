# Installed on the Lightsail VM as /etc/nginx/sites-available/aurora
# Same-origin /api → uvicorn on localhost (like local Vite proxy / docker/nginx/aurora.conf).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    # Served from /var/www (see lightsail-remote-deploy.sh): nginx runs as www-data and
    # often cannot read files under /home/ubuntu when home is mode 750.
    root /var/www/aurora-dashboard;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

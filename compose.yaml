services:
  aurora:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-AURORA}
      AURORA_BOOTSTRAP_ENGINE: ${AURORA_BOOTSTRAP_ENGINE:-1}
    volumes:
      - ./db:/app/db
      - ./artifacts:/app/artifacts

  aurora-api:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-AURORA}
    volumes:
      - ./db:/app/db
      - ./artifacts:/app/artifacts
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  aurora-web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_AURORA_API: ${VITE_AURORA_API:-}
    ports:
      - "8080:80"
    depends_on:
      aurora-api:
        condition: service_healthy
